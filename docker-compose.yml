services:
  app:
    build:
      context: .
      target: ${DOCKER_BUILD_TARGET:-development}
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_CLIENT_TIMEOUT: ${VITE_CLIENT_TIMEOUT}
        VITE_SERVER_TIMEOUT: ${VITE_SERVER_TIMEOUT}
    env_file: .env.${NODE_ENV}
    ports:
      - '${APP_EXTERNAL_PORT}:${PORT}'
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
